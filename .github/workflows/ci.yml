name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Compile check
        run: uv run python -m compileall src tests

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check with mypy
        run: uv run mypy src

      - name: Test with pytest
        run: uv run pytest -q

      - name: Build package
        run: uv build

      - name: CLI smoke tests
        run: |
          uv run context-crafter-mcp --help
          uv run context-crafter-mcp doctor
          uv run context-crafter-mcp self-test .
          uv run context-crafter-mcp detect . --json
          uv run context-crafter-mcp generate . --output .tmp/generated --profile compact --json
          uv run context-crafter-mcp validate .tmp/generated --json
