name: Smoke Repos

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra dev --extra parsers

      - name: Run real-repo smoke test
        run: uv run python scripts/smoke_repos.py --output docs/generated/smoke-results.json

      - name: Upload smoke results
        uses: actions/upload-artifact@v7
        with:
          name: smoke-results
          path: docs/generated/smoke-results.json
